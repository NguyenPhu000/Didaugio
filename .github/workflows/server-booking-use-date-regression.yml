name: Server Booking useDate Regression

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-booking-use-date-regression.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "server/**"
      - ".github/workflows/server-booking-use-date-regression.yml"

jobs:
  booking-use-date-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: didaugio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d didaugio_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/didaugio_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
      PORT: 8081
      TEST_API_BASE_URL: http://localhost:8081/api
      CORS_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations
        run: npm run migrate:deploy

      - name: Generate Prisma client
        run: npm run generate

      - name: Start API server
        run: node src/server.js > /tmp/server.log 2>&1 &

      - name: Wait for server health
        run: |
          for i in {1..40}; do
            if curl -sf http://localhost:8081/ > /dev/null; then
              echo "Server is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          cat /tmp/server.log || true
          exit 1

      - name: Run booking useDate regression test
        run: npm run test:booking-use-date

      - name: Print server logs on failure
        if: failure()
        run: cat /tmp/server.log || true
