services:
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: osrm-cantho
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
      - ./profiles:/profiles
    command: >
      osrm-routed
        --algorithm mld
        --threads 8
        --max-table-size 100
        --max-viaroute-size 100
        /data/cantho.osrm
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "4.0"
        reservations:
          memory: 512M
    shm_size: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:5000/route/v1/driving/105.78,10.03;105.75,10.04' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
